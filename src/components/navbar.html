>
</label>

<!-- mobile menu penel -->
<div

>
  <div class="flex justify-between items-center p-6 border-b border-gray-200">

    <label for="menu-toggle" class="cursor-pointer">
      <i class="fa-solid fa-xmark text-xl"></i>

  <div class="space-y-1">

    <!-- services' dropdwon -->
    <div class="max-h-0 overflow-hidden peer-checked/m:max-h-96 transition-all">

      <a
        href="/pages/services-page/useful-app.html"
        class="block px-10 py-3 hover:bg-gray-100"
        >Useful Apps</a

    </div>

    <a
      href="/pages/dos-donts.html"
      class="block px-6 py-4 border-b hover:bg-gray-100"
      >Do's & Don'ts</a

  </div>
</div>
