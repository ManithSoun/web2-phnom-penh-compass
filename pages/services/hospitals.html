<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hospitals & Clinics — Phnom Penh Compass</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../../src/css/style.css" />
  </head>

  <body class="flex flex-col min-h-screen bg-[#FBFCF6] text-gray-800">
    <header></header>

    <main class="flex-grow max-w-7xl mx-auto px-6 lg:px-10 pt-28 pb-12 w-full">
      <div class="mb-10 text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-bold text-[#202D45] mb-3">
          <i class="fa-solid fa-truck-medical text-[#DFB777] mr-3"></i>Hospitals
          & Clinics
        </h1>
        <p class="text-gray-600 text-lg">
          Find reliable medical care, clinics, and emergency rooms across Phnom
          Penh.
        </p>
      </div>

      <div class="mb-8">
        <div class="relative max-w-md">
          <i
            class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search hospitals..."
            class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-[#DFB777] focus:border-transparent"
          />
        </div>
      </div>

      <div
        id="services-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </main>
    <footer></footer>

    <script src="../../config.js"></script>
    <script src="../../src/js/components.js"></script>

    <script src="../../src/js/services.js"></script>
  </body>
</html>
