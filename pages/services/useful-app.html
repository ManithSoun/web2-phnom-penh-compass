<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Useful Apps — Phnom Penh Compass</title>
    <link rel="icon" type="image" href="/src/assets/images/tab_logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../src/css/style.css" />
  </head>

  <body class="flex flex-col min-h-screen bg-[#FBFCF6] text-gray-800">
    <header></header>

    <main class="flex-grow max-w-7xl mx-auto px-6 lg:px-10 pt-28 pb-12 w-full">
      <div
        class="mb-10 text-center flex flex-col items-center justify-center w-full px-4 sm:px-0"
      >
        <h1
          class="text-3xl sm:text-4xl font-black text-[#202D45] flex items-center justify-center gap-3 mb-3"
        >
          <i class="fa-solid fa-mobile-screen text-[#DFB777]"></i> Useful Apps
        </h1>
        <p class="text-gray-500 text-sm sm:text-base max-w-2xl mx-auto">
          Essential mobile apps for food delivery, transportation, and
          navigating the city.
        </p>
      </div>

      <div
        class="flex flex-col sm:flex-row gap-4 mb-8 max-w-4xl mx-auto w-full px-4 sm:px-0 relative z-20"
      >
        <div class="relative flex-1 w-full">
          <i
            class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search..."
            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 text-[#202D45] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#DFB777] shadow-sm transition-shadow"
            onkeyup="renderCards()"
          />
        </div>

        <div
          class="relative w-full sm:w-64 shrink-0"
          id="customDropdownContainer"
        >
          <button
            onclick="toggleFilterDropdown(event)"
            class="w-full flex items-center justify-between bg-white border border-gray-200 text-gray-400 py-3 pl-4 pr-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#DFB777] shadow-sm transition-all text-left"
          >
            <span id="selectedFilterText" class="truncate pr-2"
              >All Categories</span
            >
            <i
              class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"
              id="filterDropdownIcon"
            ></i>
          </button>

          <div
            id="customDropdownMenu"
            class="absolute left-0 right-0 top-[110%] bg-white border border-gray-100 rounded-2xl shadow-xl opacity-0 pointer-events-none transform -translate-y-2 transition-all duration-300 z-50 overflow-hidden"
          >
            <style>
              .menu-scroll::-webkit-scrollbar {
                width: 6px;
              }
              .menu-scroll::-webkit-scrollbar-track {
                background: transparent;
              }
              .menu-scroll::-webkit-scrollbar-thumb {
                background-color: #e5e7eb;
                border-radius: 10px;
              }
            </style>
            <div
              class="max-h-60 overflow-y-auto py-2 menu-scroll"
              id="customDropdownOptions"
            ></div>
          </div>
        </div>
      </div>

      <div
        id="services-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </main>

    <footer></footer>

    <script src="../../config.js"></script>
    <script src="../../src/js/components.js"></script>
    <script src="../../src/js/services.js"></script>
    <script src="../../src/js/servicesData.js"></script>
    <script src="../../tailwind-config.js"></script>
  </body>
</html>
