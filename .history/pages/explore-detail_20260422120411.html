<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Detail - Phnom Penh Compass</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../src/css/style.css" />
  </head>

  <body class="flex flex-col min-h-screen bg-background text-gray-800">
    <header></header>

    <main class="grow pt-24 pb-12">
      <section class="max-w-5xl px-4 mx-auto sm:px-6 lg:px-8">
        <a href="explore.html" class="inline-flex items-center gap-2 mb-6 text-sm font-medium text-secondary hover:underline">
          <i class="fa-solid fa-arrow-left"></i>
          Back to Explore
        </a>

        <article class="grid gap-6 p-6 bg-white border border-gray-100 shadow-md rounded-2xl md:grid-cols-2">
          <img
            id="place-image"
            src=""
            alt=""
            class="object-cover w-full h-72 rounded-xl"
          />

          <div>
            <h1 id="place-name" class="mb-3 text-3xl font-bold text-primary"></h1>
            <p id="place-location" class="mb-2 text-sm text-gray-600"></p>
            <p id="place-description" class="mb-4 text-gray-700"></p>
            <div class="flex items-center gap-4 text-sm">
              <span id="place-price" class="font-semibold text-secondary"></span>
              <span id="place-hours" class="font-medium text-primary"></span>
            </div>
            <a
              id="place-map"
              href="#"
              target="_blank"
              class="inline-block px-4 py-2 mt-5 text-white transition rounded-lg bg-primary hover:bg-[#162f45]"
            >
              Open in Maps
            </a>
          </div>
        </article>

        <section class="p-6 mt-8 bg-white border border-gray-100 shadow-md rounded-2xl">
          <h2 class="mb-4 text-2xl font-bold text-primary">Share your feedback</h2>

          <form id="comment-form" class="space-y-4">
            <div>
              <label for="comment-name" class="block mb-1 text-sm font-medium">Name</label>
              <input
                id="comment-name"
                name="name"
                type="text"
                maxlength="40"
                placeholder="Your name"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                required
              />
            </div>

            <div>
              <label for="comment-message" class="block mb-1 text-sm font-medium">Comment</label>
              <textarea
                id="comment-message"
                name="message"
                rows="4"
                maxlength="400"
                placeholder="Tell others about your experience"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                required
              ></textarea>
            </div>

            <div>
              <label for="comment-photo" class="block mb-1 text-sm font-medium">Photo (optional)</label>
              <input
                id="comment-photo"
                name="photo"
                type="file"
                accept="image/*"
                class="block w-full text-sm"
              />
              <p class="mt-1 text-xs text-gray-500">Max 1 MB image for local storage safety.</p>
            </div>

            <button
              type="submit"
              class="px-4 py-2 text-white transition rounded-lg bg-primary hover:bg-[#162f45]"
            >
              Post Comment
            </button>
          </form>
        </section>

        <section class="p-6 mt-8 bg-white border border-gray-100 shadow-md rounded-2xl">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-2xl font-bold text-primary">Community comments</h2>
          </div>
          <p class="mb-4 text-sm text-gray-500">Checkout the place reviews and feedbacks.</p>

          <div id="comments-list" class="space-y-4"></div>
        </section>
      </section>
    </main>

    <footer></footer>

    <script src="../config.js"></script>
    <script src="../src/js/components.js"></script>
    <script src="../src/js/exploreData.js"></script>
    <script src="../src/js/explore-detail.js"></script>
    <script src="../tailwind-config.js"></script>
  </body>
</html>
